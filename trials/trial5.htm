
<style>
  .image-card {
  width: 100%;
  height: 200px; /* Adjust height as needed */
  overflow: hidden;
  border-radius: 10px;
  margin-bottom: 20px;
  position: relative;
}

.image-track {
  display: flex;
  width: 500%; /* 5 images total (4 + 1 loop) = 500% */
  height: 100%;
  animation: slideShow 24s infinite cubic-bezier(0.85, 0, 0.15, 1);
}

.image-track img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Keeps image aspect ratio clean */
}

/* Animation Breakdown:
   4 images x 6 seconds = 24s total cycle.
   Each 25% of the time represents one image.
*/
@keyframes slideShow{
  0%, 20% { transform: translateX(0); }
  25%, 45% { transform: translateX(-20%); }
  50%, 70% { transform: translateX(-40%); }
  75%, 95% { transform: translateX(-60%); }
  100% { transform: translateX(-80%); }
}
</style>


<div class="image-card">
  <div class="image-track">
    <img src="../images/about_bg.jpg" alt="Gallery 1">
    <img src="../images/fleet1.jpg" alt="Gallery 2">
    <img src="../images/fleet1b.jpg" alt="Gallery 3">
    <img src="../images/fleet2.jpg" alt="Gallery 4">
    <img src="../images/fleet2b.jpg" alt="Gallery 1">
  </div>
</div>
